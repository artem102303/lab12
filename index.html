<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 30px auto;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
        }

        li {
            margin: 10px 0;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>

<div class="todo-app">
    <h1>Мій список справ</h1>

    <form id="todo-form">
        <input type="text" id="task-input" placeholder="Що потрібно зробити?"  required>
        <button type="submit">Додати</button>
    </form>

    <ul id="task-list"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
